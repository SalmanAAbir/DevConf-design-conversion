<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConf 2026 Landing Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <!-- Nav started -->
    <header class="header">
        <div class="header-inner">
            <a href="#" class="logo">
                <img class="logo-full" src="./assets/images/logo.png" alt="DevConf 2026">
                <img class="logo-mini" src="./assets/images/logo-mini.png" alt="DevConf 2026">
            </a>

            <nav class="nav" aria-label="Main">
                <ul class="nav-list">
                    <li><a href="#speakers">Speakers</a></li>
                    <li><a href="#schedule">Schedule</a></li>
                    <li><a href="#tracks">Tracks</a></li>
                    <li><a href="#venue">Venue</a></li>
                    <li><a href="#blog">Blog</a></li>
                </ul>
            </nav>

            <a href="#register" class="btn-primary btn-register">Register Now</a>
        </div>
    </header>
    <!-- Nav ended -->

    <!-- Hero banner started -->
    <div class="banner">
        <div class="banner-overlay"></div>
        <div class="banner-content">
            <div class="top-section">
                <h1 class="banner-title">Code. <em>Connect.</em> Create</h1>
                <p class="banner-text">
                    Join 4,000+ engineers, founders, and builders at the premier developer
                    conference of 2026. Three days of cutting-edge talks, hands-on workshops,
                    and meaningful connections.
                </p>
            </div>
            <a href="#register" class="btn-primary btn-register-hero">Register Now</a>
        </div>
    </div>
    <!-- Hero banner ended -->
</body>

</html>
